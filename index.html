<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyIMCA Habitat Coverage</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0"></script>
    
    <style>
        :root {
            --primary: #0b57d0;
            --surface: #ffffff;
            --surface-container: #f0f4f9;
            --surface-container-high: #e9ebf0;
            --on-surface-default: #1b1c1d;
            --on-surface-de-emphasis: #444746;
            --outline: #747775;
            --chart-coral: #06bbdf;
            --chart-seagrass: #44c265;
            --chart-mangrove: #fcbe00;
        }
        body { font-family: "Google Sans", sans-serif; background-color: var(--surface); color: var(--on-surface-default); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .dashboard-header { padding: 16px 24px; background-color: var(--surface-container); border-bottom: 1px solid var(--surface-container-high); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .dropdown { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--outline); background-color: var(--surface); cursor: pointer; min-width: 200px; }
        .metrics-container { display: flex; gap: 24px; }
        .metric-pill { display: flex; flex-direction: column; }
        .metric-label { font-size: 12px; color: var(--on-surface-de-emphasis); }
        .metric-value { font-size: 18px; font-weight: 700; }
        .main-content { display: flex; flex-grow: 1; padding: 16px; gap: 16px; min-height: 0; }
        .widget-panel { background-color: var(--surface-container); border: 1px solid var(--surface-container-high); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chart-container { flex-grow: 1; min-height: 300px; position: relative; }
        .list-widget { width: 320px; flex-shrink: 0; }
        .list-header { padding: 16px; background-color: var(--surface-container-high); display: flex; justify-content: space-between; }
        .list-body { flex-grow: 1; overflow-y: auto; padding: 8px; }
        .list-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; }
        .list-icon { color: var(--primary); font-size: 18px; }
        .d3-tooltip { position: absolute; pointer-events: none; background: rgba(255,255,255,0.95); border: 1px solid #ccc; padding: 8px; border-radius: 4px; font-size: 12px; opacity: 0; z-index: 100; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div>
            <h2 class="text-lg font-bold m-0">ECPM Habitat & Species Coverage</h2>
            <p class="text-xs text-[var(--on-surface-de-emphasis)] m-0">MyIMCA Sites Area Distribution</p>
        </div>
        <select id="site-selector" class="dropdown">
            <option value="All">ECPM MyIMCA Site</option>
            <option value="Kepulauan Mersing">Kepulauan Mersing</option>
            <option value="Kuantan-Pekan">Kuantan-Pekan</option>
            <option value="Kepulauan Terengganu-Setiu & Tenggol">Kepulauan Terengganu-Setiu & Tenggol</option>
        </select>
        <div class="metrics-container">
            <div class="metric-pill"><span class="metric-label">Total Area</span><span id="total-area" class="metric-value text-[var(--primary)]">0.00 km²</span></div>
            <div class="metric-pill"><span class="metric-label">Total Species</span><span id="species-count-metric" class="metric-value">0</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="widget-panel chart-container" id="chart-container">
            <div id="tooltip" class="d3-tooltip"></div>
        </div>
        <div class="widget-panel list-widget">
            <div class="list-header"><h3>Species Present</h3></div>
            <div class="list-body" id="species-list"></div>
        </div>
    </div>

    <script>
        const RAW_DATA = [
            { site: "Kepulauan Mersing", Coral: 28.44, Seagrass: 109.41, Mangroves: 5.85, Species: "Dugong, Leatherback Turtle, Green Turtle, Hawksbill Turtle, Olive Ridley Turtle, Blacktip Reef Shark, Eagle Ray, Wedgefish, Tiger Shark, Sicklefin Weasel Shark, Whale Shark, Bottlenose Wedgefish" },
            { site: "Kuantan-Pekan", Coral: 0.17, Seagrass: 1.89, Mangroves: 41.16, Species: "Green Turtle, Hawksbill Turtle, Dwarf Whipray, Whitespotted Whipray" },
            { site: "Kepulauan Terengganu-Setiu & Tenggol", Coral: 4.28, Seagrass: 0.10, Mangroves: 10.26, Species: "Green Turtle, Hawksbill Turtle, River Terrapin, Spiny Turtle, Asian Giant Softshell Turtle, Blacktip Reef Shark, Whale Shark, Gelam Trees, Manta Ray, Humphead Wrasse, Giant Clam, Bumphead Parrotfish" }
        ];

        function getIcon(s) {
            const n = s.toLowerCase();
            if (n.includes('turtle') || n.includes('terrapin')) return 'pets';
            if (n.includes('shark') || n.includes('ray') || n.includes('wrasse') || n.includes('parrotfish') || n.includes('wedgefish')) return 'set_meal';
            if (n.includes('dugong') || n.includes('dolphin') || n.includes('whale')) return 'water';
            return 'eco';
        }

        function updateUI(siteFilter = "All") {
            let c=0, sg=0, m=0;
            let sp = new Set();
            RAW_DATA.forEach(r => {
                if(siteFilter === "All" || r.site === siteFilter) {
                    c+=r.Coral; sg+=r.Seagrass; m+=r.Mangroves;
                    r.Species.split(', ').forEach(s => sp.add(s));
                }
            });
            const tot = c+sg+m;
            document.getElementById('total-area').innerText = tot.toFixed(2) + " km²";
            document.getElementById('species-count-metric').innerText = sp.size;
            
            const list = document.getElementById('species-list');
            list.innerHTML = '';
            Array.from(sp).sort().forEach(s => {
                list.innerHTML += `<div class="list-item"><span class="material-icons list-icon">${getIcon(s)}</span><span class="text-sm">${s}</span></div>`;
            });

            renderPieChart([
                { id: "Coral Reefs", value: c, color: "var(--chart-coral)" },
                { id: "Seagrass", value: sg, color: "var(--chart-seagrass)" },
                { id: "Mangroves", value: m, color: "var(--chart-mangrove)" }
            ]);
        }

        function renderPieChart(data) {
            const container = document.getElementById('chart-container');
            container.innerHTML = '<div id="tooltip" class="d3-tooltip"></div>';
            const width = container.clientWidth, height = container.clientHeight;
            const svg = d3.select(container).append("svg").attr("width", width).attr("height", height);
            const g = svg.append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            const pie = d3.pie().value(d => d.value);
            const arc = d3.arc().innerRadius(80).outerRadius(Math.min(width, height)/3);
            
            g.selectAll("path").data(pie(data.filter(d => d.value > 0))).enter().append("path")
                .attr("d", arc).attr("fill", d => d.data.color).attr("stroke", "white").style("stroke-width", "2px");
        }

        document.getElementById('site-selector').addEventListener('change', (e) => updateUI(e.target.value));
        window.onload = () => updateUI();
    </script>
</body>
</html>
